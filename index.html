<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanderworld</title>

<style>
body {
    background: #676767;
    color: white;
    font-family: Arial;
    text-align: center;
}

#world {
    width: 800px;
    height: 600px;
    margin: auto;
    background: green;
    position: relative; 
    overflow: hidden;
    cursor: crosshair;
}

.player {
    position: absolute;
    text-align: center;
    color: white;
    transition: 1s linear;
}

.player img {
    width: 64px;
    display: block;
}

.chat {
    background: rgba(0,0,0,0.5);
    padding: 2px 6px;
    border-radius: 5px;
    margin-top: 4px;
    min-width: 40px;
}
</style>
</head>

<body>

<h1>Wanderworld</h1>

<div id="world"></div>

<br>

<input id="name" placeholder="Your name">
<button onclick="join()">Join</button>

<br><br>

<input id="chatInput" placeholder="Say something...">
<button onclick="sendMessage()">Send</button>

<script>
const URL = "https://tinkr.tech/sdb/a/wanderworld";

let playerKey = "";

async function join() {

    const username = document.getElementById("name").value;

    const response = await fetch(URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            action: "join",
            username: username
        })
    });

    const data = await response.json();

    console.log(data);

    playerKey = data.player_key;

    alert("Joined!");
}

async function sendMessage() {

    const message = document.getElementById("chatInput").value;

    if (!playerKey) {
        alert("Join first!");
        return;
    }

    try {

        const response = await fetch(URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: "message",
                player_key: playerKey,
                message: message
            })
        });

        const data = await response.json();

        console.log(data);

        document.getElementById("chatInput").value = "";

    } catch (err) {
        console.error(err);
    }
}

async function movePlayer(x, y) {

    if (!playerKey) return;

    try {

        const response = await fetch(URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                action: "move",
                player_key: playerKey,
                x: x,
                y: y
            })
        });

        const data = await response.json();

        console.log(data);

    } catch (err) {
        console.error(err);
    }
}

const world = document.getElementById("world");

world.addEventListener("click", function(event) {

    const rect = world.getBoundingClientRect();

    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;

    movePlayer(x, y);
});

async function render() {

    try {

        const response = await fetch(URL);
        const data = await response.json();

        console.log(data);

        const world = document.getElementById("world");

        world.innerHTML = "";

        if (!data.players) return;

        for (let player of data.players) {

            const div = document.createElement("div");
            div.className = "player";

            div.style.left = player.x + "px";
            div.style.top = player.y + "px";

            div.innerHTML = `
                <img src="https://tinkr.tech${player.image}">
                <div>${player.username}</div>
                <div class="chat">${player.message || ""}</div>
            `;

            world.appendChild(div);
        }

    } catch (err) {
        console.error(err);
    }
}

document.getElementById("chatInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendMessage();
    }
});

setInterval(render, 1000);

render();
</script>

</body>
</html>
