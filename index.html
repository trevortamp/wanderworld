<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanderworld</title>
</head>
<style>
body {
    background: #676767;
    color: white;
}
#world {
    width: 800px;
    height: 600px;
    margin: auto;
    background: green;
}
.player {
    position: absolute;
    text-align: center;
}
.player img {
    width: 64px;
}

</style>

<body>
<h1> Wanderworld</h1>
<div id="world"></div>
<input id="name" placeholder="Your name">
<button onclick="join()">Join</button>    
<input id="message" placeholder="Chat">

<script>
  const URL = "https://tinkr.tech/sdb/a/wanderworld";

let playerKey = "";


async function join() {

  const username = document.getElementById("name").value;

  const response = await fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "join",
      username: username
    })
  });

  const data = await response.json();

  playerKey = data.player_key;

  alert("Joined!");
}


async function render() {

  const response = await fetch(URL);
  const data = await response.json();

  const world = document.getElementById("world");

  world.innerHTML = "";

  for (let player of data.players) {

    const div = document.createElement("div");
    div.className = "player";

    div.style.left = player.x + "px";
    div.style.top = player.y + "px";

    div.innerHTML = `
      <img src="https://tinkr.tech${player.image}">
      <div>${player.username}</div>
      <div class="chat">${player.message || ""}</div>
    `;

    world.appendChild(div);
  }
}
</script>
</body>

</html>
